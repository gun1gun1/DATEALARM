<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잉크 안정성 검토 알람</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-wrapper">

    <!-- 상단 헤더 + 네비게이션 -->
    <header id="app-header">
      <p id="app-title">🧪 잉크 안정성 검토 알람</p>
      <nav id="app-nav">
        <button class="nav-btn" data-view="home">오늘의 검토</button>
        <button class="nav-btn" data-view="projects">프로젝트</button>
        <button class="nav-btn" data-view="settings">설정</button>
      </nav>
    </header>

    <!-- 메인 콘텐츠 -->
    <main id="app-main">
      <section id="view-home"   class="view-section"></section>
      <section id="view-projects" class="view-section"></section>
      <section id="view-detail"  class="view-section"></section>
      <section id="view-settings" class="view-section"></section>
    </main>

  </div>

  <!-- 로드 순서: 의존 모듈부터 -->
  <script src="js/constants.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/date-utils.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/views/home.js"></script>
  <script src="js/views/projects.js"></script>
  <script src="js/views/detail.js"></script>
  <script src="js/views/settings.js"></script>
  <script src="js/gas-export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
